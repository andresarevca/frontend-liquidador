server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API → Django backend (mismo nombre de contenedor en la red compartida)
    location /api/ {
        proxy_pass         http://liquidador_web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback — todas las rutas del router van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
